<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>央视节目单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .channel-selector {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .channel-selector label {
            font-size: 14px;
            opacity: 0.9;
        }

        .channel-selector select {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .channel-selector select:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .channel-selector select option {
            background: #2a5298;
            color: white;
        }

        .live-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .live-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .channel-info {
            padding: 20px 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-bottom: 1px solid #e0e0e0;
        }

        .channel-name {
            font-size: 20px;
            font-weight: 600;
            color: #2a5298;
            margin-bottom: 8px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }

        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #f5576c;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .date-navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
            border-bottom: 1px solid #e0e0e0;
            gap: 15px;
        }

        .date-nav-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .date-nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .date-nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .date-nav-btn.today {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .current-date {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #2a5298;
            padding: 0 15px;
        }

        .program-list {
            padding: 20px 30px;
            max-height: 600px;
            overflow-y: auto;
        }

        .program-list::-webkit-scrollbar {
            width: 8px;
        }

        .program-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .program-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
        }

        .program-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            margin-bottom: 12px;
            background: white;
            border-radius: 12px;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .program-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .program-item.current {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left-color: #f5576c;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .program-item.past {
            opacity: 0.5;
        }

        .time-section {
            flex-shrink: 0;
            width: 100px;
            margin-right: 20px;
        }

        .program-time {
            font-size: 18px;
            font-weight: 600;
            color: #2a5298;
        }

        .program-duration {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .program-title {
            flex: 1;
            font-size: 16px;
            color: #333;
            line-height: 1.4;
        }

        .program-item.current .program-title {
            font-weight: 600;
            color: #2a5298;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 60px 20px;
            color: #f5576c;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .channel-selector {
                flex-direction: column;
                align-items: stretch;
            }

            .live-btn {
                text-align: center;
            }

            .date-navigation {
                flex-direction: column;
                padding: 15px;
            }

            .current-date {
                font-size: 14px;
            }

            .program-list {
                padding: 15px;
            }

            .program-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .time-section {
                width: 100%;
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 央视节目单</h1>
            <div class="channel-selector">
                <label for="channel">选择频道：</label>
                <select id="channel">
                    <option value="cctv1">CCTV-1 综合</option>
                    <option value="cctv2">CCTV-2 财经</option>
                    <option value="cctv3">CCTV-3 综艺</option>
                    <option value="cctv4">CCTV-4 中文国际</option>
                    <option value="cctv5">CCTV-5 体育</option>
                    <option value="cctv5plus">CCTV-5+ 体育赛事</option>
                    <option value="cctv6">CCTV-6 电影</option>
                    <option value="cctv7">CCTV-7 国防军事</option>
                    <option value="cctv8">CCTV-8 电视剧</option>
                    <option value="cctv9">CCTV-9 纪录</option>
                    <option value="cctv10">CCTV-10 科教</option>
                    <option value="cctv11">CCTV-11 戏曲</option>
                    <option value="cctv12">CCTV-12 社会与法</option>
                    <option value="cctv13">CCTV-13 新闻</option>
                    <option value="cctv14">CCTV-14 少儿</option>
                    <option value="cctv15">CCTV-15 音乐</option>
                    <option value="cctv16">CCTV-16 奥林匹克</option>
                </select>
                <a href="#" id="liveBtn" class="live-btn" target="_blank">🔴 观看直播</a>
            </div>
        </div>

        <div class="channel-info" id="channelInfo" style="display: none;">
            <div class="channel-name" id="channelName"></div>
            <div class="now-playing">
                <span class="live-indicator"></span>
                <span>正在播放：</span>
                <span id="nowPlaying"></span>
            </div>
        </div>

        <div class="date-navigation">
            <button class="date-nav-btn" id="prevDay">◀ 前一天</button>
            <div class="current-date" id="currentDate"></div>
            <button class="date-nav-btn" id="nextDay">后一天 ▶</button>
            <button class="date-nav-btn today" id="todayBtn">今天</button>
        </div>

        <div class="program-list" id="programList">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>正在加载节目单...</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentData = null;
        let currentChannel = 'cctv1';
        let selectedDate = new Date();

        // 格式化日期
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekDay = weekDays[date.getDay()];
            return `${year}年${month}月${day}日 星期${weekDay}`;
        }

        // 格式化日期（用于显示）
        function formatDateShort(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekDay = weekDays[date.getDay()];
            return `${year}-${month}-${day} 星期${weekDay}`;
        }

        // 格式化持续时间
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            if (hours > 0) {
                return `${hours}小时${minutes}分钟`;
            }
            return `${minutes}分钟`;
        }

        // 获取日期字符串（用于API）
        function getDateString(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }

        // 判断是否是今天
        function isToday(date) {
            const today = new Date();
            return date.getFullYear() === today.getFullYear() &&
                   date.getMonth() === today.getMonth() &&
                   date.getDate() === today.getDate();
        }

        // 判断是否是未来日期
        function isFutureDate(date) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const checkDate = new Date(date);
            checkDate.setHours(0, 0, 0, 0);
            return checkDate > today;
        }

        // 判断节目是否正在播放
        function isCurrentlyPlaying(program, liveSt) {
            return program.st === liveSt;
        }

        // 判断节目是否已经播放过
        function isPastProgram(program) {
            const now = Math.floor(Date.now() / 1000);
            return program.et < now;
        }

        // 更新日期显示和按钮状态
        function updateDateDisplay() {
            const currentDateEl = document.getElementById('currentDate');
            const prevDayBtn = document.getElementById('prevDay');
            const nextDayBtn = document.getElementById('nextDay');
            const todayBtn = document.getElementById('todayBtn');

            currentDateEl.textContent = formatDateShort(selectedDate);

            // 禁用未来日期的按钮
            if (isFutureDate(selectedDate)) {
                nextDayBtn.disabled = true;
            } else {
                nextDayBtn.disabled = false;
            }

            // 如果是今天，隐藏"今天"按钮，否则显示
            if (isToday(selectedDate)) {
                todayBtn.style.display = 'none';
            } else {
                todayBtn.style.display = 'block';
            }
        }

        // 加载节目单数据
        async function loadEPG(channel, date) {
            const programList = document.getElementById('programList');
            const channelInfo = document.getElementById('channelInfo');
            const liveBtn = document.getElementById('liveBtn');
            
            programList.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载节目单...</div>
                </div>
            `;

            const dateStr = getDateString(date);
            const apiUrl = `https://api.cntv.cn/epg/epginfo?serviceId=tvcctv&c=${channel}&d=${dateStr}&t=json`;

            try {
                // 使用 JSONP 方式请求数据（因为可能有跨域限制）
                const data = await fetchEPGData(apiUrl, channel);
                
                if (data && data[channel]) {
                    currentData = data[channel];
                    renderProgramList(currentData, date);
                } else {
                    throw new Error('数据格式错误');
                }
            } catch (error) {
                console.error('加载失败:', error);
                programList.innerHTML = `
                    <div class="error">
                        <div style="font-size: 48px; margin-bottom: 15px;">😕</div>
                        <div>加载节目单失败，请稍后重试</div>
                        <div style="margin-top: 10px; font-size: 12px; color: #999;">${error.message}</div>
                    </div>
                `;
                channelInfo.style.display = 'none';
            }
        }

        // 通过JSONP获取数据
        function fetchEPGData(url, channel) {
            return new Promise((resolve, reject) => {
                // 创建一个唯一的回调函数名
                const callbackName = `epgCallback_${Date.now()}`;
                
                // 创建script标签
                const script = document.createElement('script');
                script.src = `${url}&callback=${callbackName}`;
                
                // 定义回调函数
                window[callbackName] = function(data) {
                    resolve(data);
                    delete window[callbackName];
                    document.body.removeChild(script);
                };
                
                // 错误处理
                script.onerror = function() {
                    reject(new Error('网络请求失败'));
                    delete window[callbackName];
                    document.body.removeChild(script);
                };
                
                // 设置超时
                setTimeout(() => {
                    if (window[callbackName]) {
                        reject(new Error('请求超时'));
                        delete window[callbackName];
                        document.body.removeChild(script);
                    }
                }, 10000);
                
                document.body.appendChild(script);
            });
        }

        // 渲染节目列表
        function renderProgramList(data, date) {
            const programList = document.getElementById('programList');
            const channelInfo = document.getElementById('channelInfo');
            const channelName = document.getElementById('channelName');
            const nowPlaying = document.getElementById('nowPlaying');
            const liveBtn = document.getElementById('liveBtn');

            // 更新频道信息
            channelName.textContent = data.channelName;
            
            // 设置直播链接
            if (data.lvUrl) {
                liveBtn.href = data.lvUrl;
                liveBtn.style.display = 'inline-block';
            } else {
                liveBtn.style.display = 'none';
            }

            // 只有今天才显示正在播放
            const isDateToday = isToday(date);
            if (isDateToday) {
                nowPlaying.textContent = data.isLive || '暂无信息';
                document.querySelector('.now-playing').style.display = 'flex';
            } else {
                document.querySelector('.now-playing').style.display = 'none';
            }

            // 显示频道信息
            channelInfo.style.display = 'block';

            // 渲染节目列表
            if (data.program && data.program.length > 0) {
                let html = '';
                let currentProgramIndex = -1;

                // 只有今天才找到当前正在播放的节目索引
                if (isDateToday) {
                    data.program.forEach((program, index) => {
                        if (isCurrentlyPlaying(program, data.liveSt)) {
                            currentProgramIndex = index;
                        }
                    });
                }

                data.program.forEach((program, index) => {
                    const isCurrent = index === currentProgramIndex;
                    let isPast = false;
                    
                    // 只有今天才判断是否已播放
                    if (isDateToday) {
                        isPast = isPastProgram(program);
                    }
                    
                    let itemClass = 'program-item';
                    if (isCurrent) itemClass += ' current';
                    else if (isPast) itemClass += ' past';

                    const duration = formatDuration(program.duration);

                    html += `
                        <div class="${itemClass}" id="program-${index}">
                            <div class="time-section">
                                <div class="program-time">${program.showTime}</div>
                                <div class="program-duration">${duration}</div>
                            </div>
                            <div class="program-title">${program.t}</div>
                        </div>
                    `;
                });

                programList.innerHTML = html;

                // 滚动到当前播放的节目（仅今天）
                if (isDateToday && currentProgramIndex >= 0) {
                    setTimeout(() => {
                        const currentElement = document.getElementById(`program-${currentProgramIndex}`);
                        if (currentElement) {
                            currentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 100);
                } else {
                    // 非今天，滚动到顶部
                    setTimeout(() => {
                        programList.scrollTop = 0;
                    }, 100);
                }
            } else {
                programList.innerHTML = `
                    <div class="error">
                        <div style="font-size: 48px; margin-bottom: 15px;">📭</div>
                        <div>暂无节目信息</div>
                    </div>
                `;
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const channelSelect = document.getElementById('channel');
            const prevDayBtn = document.getElementById('prevDay');
            const nextDayBtn = document.getElementById('nextDay');
            const todayBtn = document.getElementById('todayBtn');
            
            // 初始化日期显示
            updateDateDisplay();

            // 加载默认频道
            loadEPG(currentChannel, selectedDate);

            // 频道切换事件
            channelSelect.addEventListener('change', function() {
                currentChannel = this.value;
                loadEPG(currentChannel, selectedDate);
            });

            // 前一天
            prevDayBtn.addEventListener('click', function() {
                selectedDate.setDate(selectedDate.getDate() - 1);
                updateDateDisplay();
                loadEPG(currentChannel, selectedDate);
            });

            // 后一天
            nextDayBtn.addEventListener('click', function() {
                if (!isFutureDate(selectedDate)) {
                    selectedDate.setDate(selectedDate.getDate() + 1);
                    updateDateDisplay();
                    loadEPG(currentChannel, selectedDate);
                }
            });

            // 今天
            todayBtn.addEventListener('click', function() {
                selectedDate = new Date();
                updateDateDisplay();
                loadEPG(currentChannel, selectedDate);
            });
        });
    </script>
</body>
</html>
