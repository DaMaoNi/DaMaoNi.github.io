<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影视资源搜索</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; overflow-x: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 50%, #dce2f0 100%);
  min-height: 100vh;
  color: #333;
}
.bg-stars {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(2px 2px at 20% 30%, rgba(255,107,107,0.4), transparent),
    radial-gradient(2px 2px at 40% 70%, rgba(254,202,87,0.3), transparent),
    radial-gradient(1px 1px at 60% 20%, rgba(255,107,107,0.35), transparent),
    radial-gradient(1px 1px at 80% 50%, rgba(254,202,87,0.25), transparent),
    radial-gradient(2px 2px at 10% 80%, rgba(255,107,107,0.3), transparent),
    radial-gradient(1px 1px at 50% 10%, rgba(254,202,87,0.35), transparent),
    radial-gradient(1px 1px at 90% 85%, rgba(255,107,107,0.25), transparent),
    radial-gradient(2px 2px at 30% 60%, rgba(46,213,115,0.25), transparent);
  z-index: -1;
}
.hero {
  text-align: center;
  padding: 60px 20px 40px;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff9f43 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  text-shadow: 0 4px 20px rgba(255,107,107,0.2);
}
.hero p {
  color: rgba(0,0,0,0.5);
  font-size: 14px;
  letter-spacing: 2px;
}
.search-wrap {
  max-width: 680px;
  margin: 0 auto 30px;
  padding: 0 20px;
  width: 100%;
  box-sizing: border-box;
}
.search-box {
  display: flex;
  gap: 0;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 50px;
  overflow: hidden;
  overflow-x: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  max-width: 100%;
}
.search-box:focus-within {
  border-color: #feca57;
  box-shadow: 0 0 30px rgba(254,202,87,0.25), 0 4px 20px rgba(0,0,0,0.1);
}
.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 16px 24px;
  font-size: 16px;
  color: #333;
}
.search-box input::placeholder { color: rgba(0,0,0,0.4); }
.search-box button {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  border: none;
  color: #fff;
  padding: 16px 32px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.3s ease;
}
.search-box button:hover { background: linear-gradient(135deg, #ff8787, #f9703a); }
.search-box button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.result-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.result-card:hover {
  border-color: rgba(254,202,87,0.5);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
}
.result-title {
  font-size: 17px;
  font-weight: 600;
  color: #222;
  line-height: 1.5;
  word-break: break-all;
  margin-bottom: 12px;
}
.result-source {
  font-size: 12px;
  color: rgba(0,0,0,0.45);
  margin-bottom: 12px;
}
.source-tag {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  line-height: 1;
  font-weight: 500;
}
.source-tag.main { background: rgba(255,107,107,0.15); color: #e55039; }
.source-tag.xiaoyu { background: rgba(254,202,87,0.2); color: #e1b12c; }
.source-tag.juzi { background: rgba(46,213,115,0.15); color: #2ed573; }
.answer-section {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 12px 16px;
  border: 1px solid rgba(0,0,0,0.06);
}
.answer-text {
  font-size: 14px;
  color: #333;
  line-height: 1.6;
  word-break: break-all;
  white-space: pre-wrap;
}
.copy-btn {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.12);
  color: #555;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
}
.copy-btn:hover {
  background: rgba(254,202,87,0.15);
  border-color: #feca57;
  color: #e1b12c;
}
.copy-btn.copied {
  background: rgba(46,213,115,0.15);
  border-color: #2ed573;
  color: #2ed573;
}
.loading-state {
  text-align: center;
  padding: 80px 20px;
}
.reel-spinner {
  width: 50px;
  height: 50px;
  margin: 0 auto 20px;
  border: 3px solid rgba(255,107,107,0.2);
  border-top-color: #ff6b6b;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: rgba(0,0,0,0.4);
}
.empty-state .icon { font-size: 64px; margin-bottom: 16px; }
.empty-state p { font-size: 16px; }
.toast {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 14px;
  z-index: 1000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
  backdrop-filter: blur(10px);
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
@media (max-width: 640px) {
  .hero { padding: 40px 16px 30px; }
  .search-wrap { padding: 0 12px; }
  .search-box { width: 100%; }
  .search-box input { padding: 14px 18px; font-size: 15px; }
  .search-box button { padding: 14px 18px; font-size: 14px; }
  .result-card { padding: 14px 16px; }
  .result-title { font-size: 15px; }
}
</style>
</head>
<body>
<div class="bg-stars"></div>

<div class="hero">
  <h1>影 视 搜 索</h1>
  <p>FILM &amp; TV RESOURCE FINDER</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="输入影视作品名称..." autocomplete="off">
    <button id="searchBtn" onclick="doSearch()">搜 索</button>
  </div>
</div>

<div class="main" id="results"></div>

<script>
const TOKEN = 'i69';

let toastTimer = null;
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 2200);
}

const PROXY_BASE = 'https://corsproxy.io/?';

async function fetchApi(apiPath, name) {
  const params = new URLSearchParams({ name, token: TOKEN });
  const targetUrl = `http://m.kkqws.com/v/api/${apiPath}`;
  const proxyUrl = PROXY_BASE + encodeURIComponent(targetUrl);
  try {
    const res = await fetch(proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
      body: params.toString(),
      signal: AbortSignal.timeout(15000)
    });
    if (!res.ok) throw new Error('proxy error');
    const data = await res.json();
    if (data.us && data.list) return { type: apiPath, list: data.list };
    return null;
  } catch (e) {
    console.warn(`${apiPath} 请求失败:`, e.message);
    return null;
  }
}

function parseResult(item, sourceLabel) {
  const answer = item.answer || '';
  if (!answer.includes('pan.baidu.com')) {
    return null;
  }
  let title = item.question ? item.question.trim() : '';
  if (!title && sourceLabel === 'juzi') {
    title = answer.split('\n')[0].trim();
  }
  return { title, answer, source: sourceLabel };
}

function dedupTitle(items) {
  const seen = new Set();
  return items.filter(item => {
    const key = item.title.replace(/\s+/g, '');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

async function doSearch() {
  const input = document.getElementById('searchInput');
  const name = input.value.trim();
  if (!name) {
    showToast('请输入影视名称');
    return;
  }

  const resultsEl = document.getElementById('results');
  const btn = document.getElementById('searchBtn');

  resultsEl.innerHTML = '<div class="loading-state"><div class="reel-spinner"></div><div>正在搜索资源...</div></div>';
  btn.disabled = true;

  const apis = ['search', 'getXiaoyu', 'getJuzi'];
  const sourceLabels = { search: 'main', getXiaoyu: 'xiaoyu', getJuzi: 'juzi' };

  const allResults = [];
  const promises = apis.map(api => fetchApi(api, name));
  const responses = await Promise.all(promises);

  for (let i = 0; i < responses.length; i++) {
    const resp = responses[i];
    if (!resp || !resp.list) continue;
    for (const item of resp.list) {
      const parsed = parseResult(item, sourceLabels[apis[i]]);
      if (parsed) {
        allResults.push(parsed);
      }
    }
  }

  if (allResults.length === 0) {
    resultsEl.innerHTML = `
      <div class="empty-state">
        <div class="icon">🎬</div>
        <p>未找到"${escapeHtml(name)}"的相关资源</p>
        <p style="font-size:13px;margin-top:6px;">请尝试其他关键词或检查拼写</p>
      </div>`;
    btn.disabled = false;
    return;
  }

  const deduped = dedupTitle(allResults);
  renderResults(deduped);
  btn.disabled = false;
}

function renderResults(results) {
  const resultsEl = document.getElementById('results');
  let html = '';

  const sourceLabels = { main: '主搜索', xiaoyu: '小宇', juzi: '句子' };

  for (let i = 0; i < results.length; i++) {
    const item = results[i];
    const btnId = 'copy-' + i;
    html += `<div class="result-card">`;
    html += `<div class="result-title">${escapeHtml(item.title)}</div>`;
    html += `<div class="result-source">
      <span class="source-tag ${escapeAttr(item.source || 'main')}">${escapeHtml(sourceLabels[item.source] || item.source || '')}</span>
    </div>`;
    html += `<div class="answer-section">`;
    html += `<div class="answer-text">${escapeHtml(item.answer)}</div>`;
    html += `</div>`;
    html += `<div style="margin-top:12px;text-align:right;">`;
    html += `<button class="copy-btn" id="${btnId}" data-answer="${escapeAttr(item.answer)}" onclick="copyAnswer('${btnId}')">复制</button>`;
    html += `</div>`;
    html += `</div>`;
  }

  resultsEl.innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeAttr(str) {
  if (!str) return '';
  return str.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/&/g, '&amp;');
}

function copyAnswer(btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  const text = btn.dataset.answer;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '已复制';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
    }).catch(() => fallbackCopy(text, btn));
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
  } catch (e) {
    showToast('复制失败，请手动复制');
  }
  document.body.removeChild(ta);
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
