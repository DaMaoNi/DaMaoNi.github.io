<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日油价查询</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  max-width: 480px;
  width: 100%;
}
.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 32px 28px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  color: #f0a500;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
}
.location-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
  color: rgba(255, 255, 255, 0.7);
  font-size: 14px;
}
.location-row .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 8px #4ade80;
}
.date-badge {
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.45);
  margin-bottom: 20px;
}
.prices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.price-item {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 16px;
  padding: 18px 14px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.06);
  transition: all 0.3s ease;
}
.price-item:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(240, 165, 0, 0.3);
  transform: translateY(-2px);
}
.price-label {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.price-value {
  font-size: 28px;
  font-weight: 700;
  color: #f0a500;
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 2px;
}
.price-value .unit {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.5);
}
.price-change {
  font-size: 11px;
  margin-top: 4px;
}
.price-change.down { color: #4ade80; }
.price-change.up { color: #ef4444; }
.price-change.neutral { color: rgba(255, 255, 255, 0.3); }
.refresh-btn {
  display: block;
  margin: 24px auto 0;
  background: rgba(240, 165, 0, 0.15);
  border: 1px solid rgba(240, 165, 0, 0.3);
  color: #f0a500;
  padding: 10px 28px;
  border-radius: 30px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.refresh-btn:hover {
  background: rgba(240, 165, 0, 0.25);
  border-color: #f0a500;
}
.loading {
  text-align: center;
  padding: 60px 0;
  color: rgba(255, 255, 255, 0.5);
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top-color: #f0a500;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error {
  text-align: center;
  padding: 40px 20px;
  color: #ef4444;
  font-size: 14px;
}
.city-selector {
  position: relative;
  margin-bottom: 16px;
}
.city-selector select {
  width: 100%;
  padding: 10px 16px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: #fff;
  font-size: 14px;
  appearance: none;
  cursor: pointer;
  outline: none;
}
.city-selector select option {
  background: #1a1a2e;
  color: #fff;
}
.city-selector::after {
  content: '';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  border-right: 2px solid rgba(255, 255, 255, 0.4);
  border-bottom: 2px solid rgba(255, 255, 255, 0.4);
  rotate: 45deg;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>⛽ 今日油价</h1>
    </div>
    <div class="city-selector">
      <select id="citySelect"></select>
    </div>
    <div id="locationInfo" class="location-row">
      <span class="dot" style="background: #f0a500; box-shadow: 0 0 8px #f0a500;"></span>
      <span id="locationName">湖北省</span>
    </div>
    <div id="dateBadge" class="date-badge"></div>
    <div id="content" class="loading">
      <div class="spinner"></div>
      <div>正在获取油价数据...</div>
    </div>
    <button class="refresh-btn" onclick="init()">刷新数据</button>
  </div>
</div>

<script>
const API = 'https://v2.xxapi.cn/api/oilPrice';

const FUEL_TYPES = [
  { key: 'n0', label: '0号柴油' },
  { key: 'n89', label: '89号汽油' },
  { key: 'n92', label: '92号汽油' },
  { key: 'n95', label: '95号汽油' },
  { key: 'n98', label: '98号汽油' }
];

let oilData = [];
let selectedRegion = null;

function formatChange(val) {
  if (!val || val === 0) return { cls: 'neutral', text: '-' };
  const sign = val > 0 ? '+' : '';
  return {
    cls: val > 0 ? 'up' : 'down',
    text: `${sign}${val.toFixed(2)}`
  };
}

function renderPrices(region) {
  const item = oilData.find(d => d.regionName === region);
  if (!item) return;

  const container = document.getElementById('content');
  const dateStr = item.date || '';

  document.getElementById('locationName').textContent = item.regionName;
  document.getElementById('dateBadge').textContent = `数据更新: ${dateStr}`;

  let html = '<div class="prices">';
  for (const f of FUEL_TYPES) {
    const price = item[f.key];
    const change = item[f.key + 'Change'] || 0;
    const changeInfo = formatChange(change);

    if (price === 0 || price == null) continue;

    html += `
      <div class="price-item">
        <div class="price-label">${f.label}</div>
        <div class="price-value">${price}<span class="unit">元/升</span></div>
        <div class="price-change ${changeInfo.cls}">${changeInfo.text}</div>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
  container.className = '';
}

function populateSelect() {
  const select = document.getElementById('citySelect');
  select.innerHTML = '';
  const regionNames = oilData.map(d => d.regionName).sort((a, b) => {
    if (a === '北京市') return -1;
    if (b === '北京市') return 1;
    return a.localeCompare(b, 'zh-CN');
  });

  for (const name of regionNames) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === selectedRegion) opt.selected = true;
    select.appendChild(opt);
  }
}

async function init() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><div>正在获取油价数据...</div></div>';
  content.className = 'loading';

  try {
    const res = await fetch(API, { signal: AbortSignal.timeout(10000) });
    const json = await res.json();
    if (json.code !== 200 || !json.data) throw new Error('API error');

    oilData = json.data;

    const citySelect = document.getElementById('citySelect');
    citySelect.onchange = function () {
      selectedRegion = this.value;
      renderPrices(this.value);
    };

    populateSelect();

    selectedRegion = '湖北省';
    citySelect.value = '湖北省';

    if (selectedRegion) {
      renderPrices(selectedRegion);
    } else {
      content.innerHTML = '<div class="error">暂无油价数据</div>';
      content.className = 'error';
    }
  } catch (err) {
    content.innerHTML = `<div class="error">获取数据失败: ${err.message}</div>`;
    content.className = 'error';
  }
}

init();
</script>
</body>
</html>
